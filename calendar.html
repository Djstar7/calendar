<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DJSTAR-calendar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #111827;
      color: #f3f4f6;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding-top: 1rem;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 2.25rem;
      font-weight: 700;
      text-align: left;
      background: #1e40af;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      margin-bottom: 2rem;
      font-size: 1.125rem;
      color: #9ca3af;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      position: sticky;
      top: 0;
      z-index: 20;
      background-color: #111827;
      background-color: rgba(17, 24, 39, 0.9);
      padding: 1rem;
      border-bottom-left-radius: 0.5rem;
      border-bottom-right-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    select, input {
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #1f2937;
      color: #f3f4f6;
      transition: all 0.2s;
    }
    select:focus, input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #3b82f6;
    }
    button {
      margin-left: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      background-color: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    #calendarContainer {
      max-width: 900px;
      margin: 2rem auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      background: #1a202c;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .year-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 1rem;
      text-align: right;
      padding-right: 2rem;
      grid-column: 1 / -1;
    }
    .month-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 0.5rem;
      grid-column: 1 / -1;
    }
    .week-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      grid-column: 1 / -1;
    }
    .week-day-header {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 700;
      color: #d1d5db;
      text-align: center;
    }
    .day-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      grid-column: 1 / -1;
    }
    .day-row:last-of-type {
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #374151;
    }
    .day {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 700;
      color: #d1d5db;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DJSTAR Calendar</h1>
    <p class="subtitle">Bonjour, bienvenue sur le calendrier monté par DJSTAR</p>

    <div class="controls">
      <select id="indexMonth">
        <option value="0">Janvier</option>
        <option value="1">Février</option>
        <option value="2">Mars</option>
        <option value="3">Avril</option>
        <option value="4">Mai</option>
        <option value="5">Juin</option>
        <option value="6">Juillet</option>
        <option value="7">Août</option>
        <option value="8">Septembre</option>
        <option value="9">Octobre</option>
        <option value="10">Novembre</option>
        <option value="11">Décembre</option>
      </select>
      <input type="number" id="numberMonth" placeholder="nombre de mois" />
      <input type="number" id="selectedDate" />
      <button onclick="showCalendar()">Afficher</button>
    </div>

    <div id="calendarContainer"></div>
  </div>

  <script>
    const Month = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
    const week = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];

    function isLeapYear(year) {
      return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    }

    function getDaysInMonth(month, year) {
      if (month === 1) {
        return isLeapYear(year) ? 29 : 28;
      } else if (month === 3 || month === 5 || month === 8 || month === 10) {
        return 30;
      } else {
        return 31;
      }
    }

    function getDayStart(month, year) {
      let dayStart = 0;
      for (let m = 0; m < month; m++) {
        dayStart = (dayStart + getDaysInMonth(m, year)) % 7;
      }
      return dayStart;
    }

    function showCalendar() {
      const calendarContainer = document.getElementById('calendarContainer');
      calendarContainer.innerHTML = '';

      let selectedYear = 2025;
      const inputDate = document.getElementById('selectedDate').value;
      if (inputDate) {
        selectedYear = parseInt(inputDate);
      }
      const inputNumberMonth = parseInt(document.getElementById('numberMonth').value) || 1;
      const indexMonth = parseInt(document.getElementById('indexMonth').value);

      const yearElement = document.createElement('div');
      yearElement.className = 'year-title';
      yearElement.innerText = 'Année ' + selectedYear;
      calendarContainer.appendChild(yearElement);

      let dayStart = getDayStart(indexMonth, selectedYear);
      let compteur = inputNumberMonth;
      let getMonth = indexMonth;
      let currentYear = selectedYear;

      while (compteur > 0) {
        if (getMonth > 11) {
          getMonth = 0;
          currentYear++;
          const newYearElement = document.createElement('div');
          newYearElement.className = 'year-title';
          newYearElement.innerText = 'Année ' + currentYear;
          calendarContainer.appendChild(newYearElement);
          dayStart = getDayStart(getMonth, currentYear);
        }

        const numberDayMonth = getDaysInMonth(getMonth, currentYear);

        const monthElement = document.createElement('div');
        monthElement.className = 'month-title';
        monthElement.innerText = Month[getMonth];
        calendarContainer.appendChild(monthElement);

        const weekRow = document.createElement('div');
        weekRow.className = 'week-row';
        for (let i = 0; i < week.length; i++) {
          const weekDay = document.createElement('div');
          weekDay.className = 'week-day-header';
          weekDay.innerText = week[i];
          weekRow.appendChild(weekDay);
        }
        calendarContainer.appendChild(weekRow);

        let jour = 1;
        let finished = false;
        while (!finished) {
          const dayRow = document.createElement('div');
          dayRow.className = 'day-row';

          for (let i = 0; i < 7; i++) {
            const day = document.createElement('div');
            day.className = 'day';

            if ((jour === 1 && i < dayStart) || jour > numberDayMonth) {
              day.innerText = '';
            } else {
              day.innerText = jour;
              jour++;
            }

            dayRow.appendChild(day);
          }

          calendarContainer.appendChild(dayRow);

          if (jour > numberDayMonth) {
            finished = true;
            dayStart = (dayStart + numberDayMonth) % 7;
          }
        }

        getMonth++;
        compteur--;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('selectedDate').value = 2025;
      showCalendar();
    });
  </script>
</body>
</html>
